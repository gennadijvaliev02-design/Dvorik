<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1c1c1e">
    <title>Dvorik - Меню</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --tg-theme-bg-color: #1c1c1e;
            --tg-theme-text-color: #ffffff;
            --tg-theme-hint-color: #8e8e93;
            --tg-theme-link-color: #0a84ff;
            --tg-theme-button-color: #0a84ff;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #2c2c2e;
            --accent-color: #ff9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-color), #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .cart-btn {
            background: linear-gradient(135deg, var(--accent-color), #ff6b35);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(255, 149, 0, 0.3);
        }

        .cart-btn:active {
            transform: scale(0.9);
            box-shadow: 0 2px 8px rgba(255, 149, 0, 0.4);
        }

        .cart-btn.animate {
            animation: cartBounce 0.5s ease;
        }

        @keyframes cartBounce {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2) rotate(-5deg); }
            50% { transform: scale(1.1) rotate(5deg); }
            75% { transform: scale(1.15) rotate(-3deg); }
        }

        .cart-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .cart-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff3b30;
            color: white;
            font-size: 11px;
            font-weight: 800;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--tg-theme-bg-color);
            padding: 0 5px;
            animation: countPop 0.3s ease;
        }

        @keyframes countPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Hero Slider */
        .hero {
            margin-top: 72px;
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1;
        }

        .slide::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, var(--tg-theme-bg-color), transparent);
        }

        .slide-content {
            position: absolute;
            bottom: 20px;
            left: 16px;
            right: 16px;
            z-index: 2;
        }

        .slide-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .slide-subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color);
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        .slider-dots {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 6px;
            z-index: 3;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s;
        }

        .dot.active {
            background: var(--accent-color);
            width: 24px;
            border-radius: 4px;
        }

        /* Categories */
        .categories {
            padding: 20px 16px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            padding: 10px 24px;
            background: var(--tg-theme-secondary-bg-color);
            border: none;
            border-radius: 20px;
            color: var(--tg-theme-hint-color);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .category-tab.active {
            background: var(--accent-color);
            color: white;
        }

        /* Menu Grid */
        .menu-section {
            padding: 0 16px 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-left: 4px;
        }

        .menu-grid {
            display: grid;
            gap: 16px;
        }

        .menu-item {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .menu-item:active {
            transform: scale(0.98);
        }

        .item-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #3a3a3c;
        }

        .item-content {
            padding: 16px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .item-title {
            font-size: 18px;
            font-weight: 700;
            flex: 1;
        }

        .item-price {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent-color);
            margin-left: 12px;
        }

        .item-description {
            font-size: 14px;
            color: var(--tg-theme-hint-color);
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .add-btn:active {
            opacity: 0.8;
        }

        /* Cart Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--tg-theme-bg-color);
            width: 100%;
            max-height: 85vh;
            border-radius: 24px 24px 0 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--tg-theme-hint-color);
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }

        .cart-items {
            overflow-y: auto;
            flex: 1;
            padding: 16px;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .cart-item-image {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .cart-item-price {
            color: var(--accent-color);
            font-weight: 700;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--tg-theme-button-color);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-value {
            font-weight: 700;
            min-width: 24px;
            text-align: center;
        }

        .remove-btn {
            color: #ff3b30;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }

        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--tg-theme-hint-color);
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: var(--tg-theme-secondary-bg-color);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .total-label {
            color: var(--tg-theme-hint-color);
        }

        .total-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent-color);
        }

        .checkout-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .checkout-btn:active {
            opacity: 0.9;
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--tg-theme-bg-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--tg-theme-secondary-bg-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-item {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="logo">DVORIK</div>
        <button class="cart-btn" id="cartBtn" onclick="toggleCart()">
            <svg class="cart-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
            <span class="cart-count" id="cartCount">0</span>
        </button>
    </header>

    <!-- Hero Slider -->
    <section class="hero">
        <div class="slider">
            <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1556910103-1c02745a30bf?w=800&q=80');">
                <div class="slide-content">
                    <div class="slide-title">Готовим с душой</div>
                    <div class="slide-subtitle">Свежие ингредиенты каждый день</div>
                </div>
            </div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1577219491135-ce391730fb2c?w=800&q=80');">
                <div class="slide-content">
                    <div class="slide-title">Мастера гриля</div>
                    <div class="slide-subtitle">Идеальная прожарка</div>
                </div>
            </div>
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=800&q=80');">
                <div class="slide-content">
                    <div class="slide-title">Быстро и вкусно</div>
                    <div class="slide-subtitle">Лучший фастфуд в городе</div>
                </div>
            </div>
            <div class="slider-dots">
                <div class="dot active" onclick="goToSlide(0)"></div>
                <div class="dot" onclick="goToSlide(1)"></div>
                <div class="dot" onclick="goToSlide(2)"></div>
            </div>
        </div>
    </section>

    <!-- Categories -->
    <div class="categories">
        <button class="category-tab active" onclick="filterCategory('all')">Все</button>
        <button class="category-tab" onclick="filterCategory('shawarma')">Шаурма</button>
        <button class="category-tab" onclick="filterCategory('grill')">Гриль</button>
    </div>

    <!-- Menu -->
    <section class="menu-section">
        <h2 class="section-title" id="sectionTitle">Наше меню</h2>
        <div class="menu-grid" id="menuGrid">
            <!-- Items will be inserted here -->
        </div>
    </section>

    <!-- Cart Modal -->
    <div class="modal-overlay" id="cartModal" onclick="closeCartOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">Ваш заказ</div>
                <button class="close-btn" onclick="toggleCart()">✕</button>
            </div>
            <div class="cart-items" id="cartItems">
                <!-- Cart items will be inserted here -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span class="total-label">Итого:</span>
                    <span class="total-value" id="cartTotal">$0.00</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">
                    Оформить заказ
                </button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Set header color
        tg.setHeaderColor(getComputedStyle(document.documentElement).getPropertyValue('--tg-theme-bg-color'));
        tg.setBackgroundColor(getComputedStyle(document.documentElement).getPropertyValue('--tg-theme-bg-color'));

        // Menu data
        const menuItems = [
            {
                id: 1,
                name: 'Таук',
                description: 'Шаурма с курицей',
                price: 8.99,
                category: 'shawarma',
                image: 'https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=600&q=80'
            },
            {
                id: 2,
                name: 'Шаурма',
                description: 'Шаурма с говядиной',
                price: 9.99,
                category: 'shawarma',
                image: 'https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=600&q=80'
            },
            {
                id: 3,
                name: 'Гриль',
                description: 'Курица гриль',
                price: 15.99,
                category: 'grill',
                image: 'https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=600&q=80'
            },
            {
                id: 4,
                name: 'Курица на углях',
                description: 'Курица на углях',
                price: 12.99,
                category: 'grill',
                image: 'https://images.unsplash.com/photo-1532550907401-a500c9a57435?w=600&q=80'
            }
        ];

        // Cart state
        let cart = [];
        let currentCategory = 'all';

        // Slider
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');

        function goToSlide(index) {
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            currentSlide = index;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            goToSlide(currentSlide);
        }

        // Auto slide
        setInterval(nextSlide, 4000);

        // Render menu
        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';
            
            const filtered = currentCategory === 'all' 
                ? menuItems 
                : menuItems.filter(item => item.category === currentCategory);

            filtered.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'menu-item';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="item-image">
                    <div class="item-content">
                        <div class="item-header">
                            <div class="item-title">${item.name}</div>
                            <div class="item-price">$${item.price.toFixed(2)}</div>
                        </div>
                        <div class="item-description">${item.description}</div>
                        <button class="add-btn" onclick="addToCart(${item.id})">
                            <span>+</span>
                            <span>Добавить</span>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Filter category
        function filterCategory(category) {
            currentCategory = category;
            
            // Update tabs
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            renderMenu();
        }

        // Cart functions
        function addToCart(itemId) {
            const item = menuItems.find(i => i.id === itemId);
            const existingItem = cart.find(i => i.id === itemId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...item, quantity: 1 });
            }
            
            updateCartUI();
            animateCartButton();
            tg.HapticFeedback.impactOccurred('light');
        }

        function animateCartButton() {
            const cartBtn = document.getElementById('cartBtn');
            cartBtn.classList.remove('animate');
            void cartBtn.offsetWidth; // Trigger reflow
            cartBtn.classList.add('animate');
        }

        function removeFromCart(itemId) {
            cart = cart.filter(i => i.id !== itemId);
            updateCartUI();
        }

        function updateQuantity(itemId, delta) {
            const item = cart.find(i => i.id === itemId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(itemId);
                } else {
                    updateCartUI();
                }
            }
        }

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="cart-empty">Корзина пуста<br>Добавьте что-нибудь вкусное!</div>';
                checkoutBtn.disabled = true;
                cartTotal.textContent = '$0.00';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">$${(item.price * item.quantity).toFixed(2)}</div>
                        </div>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                            <span class="qty-value">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${item.id})">🗑</button>
                    </div>
                `).join('');
                
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                cartTotal.textContent = `$${total.toFixed(2)}`;
                checkoutBtn.disabled = false;
            }
        }

        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.classList.toggle('active');
            if (modal.classList.contains('active')) {
                tg.BackButton.show();
                tg.BackButton.onClick(() => toggleCart());
            } else {
                tg.BackButton.hide();
            }
        }

        function closeCartOnOverlay(event) {
            if (event.target === event.currentTarget) {
                toggleCart();
            }
        }

        function checkout() {
            if (cart.length === 0) return;
            
            const orderData = {
                items: cart.map(item => ({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity
                })),
                total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                timestamp: new Date().toISOString()
            };
            
            // Send data to Telegram
            tg.sendData(JSON.stringify(orderData));
            
            // Show success message
            tg.showPopup({
                title: 'Заказ оформлен!',
                message: `Сумма заказа: $${orderData.total.toFixed(2)}`,
                buttons: [{type: 'ok'}]
            });
            
            // Clear cart
            cart = [];
            updateCartUI();
            toggleCart();
        }

        // Initialize
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                renderMenu();
                updateCartUI();
            }, 500);
        };

        // Handle theme changes
        tg.onEvent('themeChanged', () => {
            // Refresh styles if needed
        });
    </script>
</body>
</html>
